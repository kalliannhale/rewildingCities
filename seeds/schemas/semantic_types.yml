# ============================================================
# seeds/schemas/semantic_types.yml
# Additions for the thermal analysis toolkit
# Append these to the existing types block
# ============================================================

types:

  # --- Thermal analysis types ---

  gi_star_z_scores:
    category: raster
    format: tiff
    description: >
      Getis-Ord Gi* z-scores per raster cell. Positive values
      indicate local clustering of high values (potential hot spot),
      negative values indicate clustering of low values (potential
      cold spot). The magnitude indicates statistical strength.
    typical_units: z-score (standard deviations)
    value_range: [-10, 10]

  thermal_hotspot_classification:
    category: raster
    format: tiff
    description: >
      Integer-classified raster of thermal clusters. Codes:
      99/-99 = hot/cold spot at 99% confidence,
      95/-95 = 95% (exclusive of 99%),
      90/-90 = 90% (exclusive of 95%),
      0 = not significant.
    typical_units: classification code
    value_range: [-99, 99]

  thermal_cluster_summary:
    category: tabular
    format: csv
    description: >
      Summary statistics for thermal cluster classification.
      Rows per confidence tier with cell counts and percentages.
      Tiers are exclusive (no double-counting).

  study_boundary:
    category: vector
    format: geojson
    description: >
      Boundary polygon defining the spatial extent of analysis.
      May be a city boundary, neighborhood, watershed, or any
      user-defined area of interest.

  city_boundary:
    category: vector
    format: geojson
    description: >
      Administrative boundary of a city or municipality.
      Commonly used as the study boundary for city-wide analyses.
      

  # === Vector Types ===
  
  
  park_boundaries:
    category: vector
    format: geojson
    description: Raw park boundary polygons from municipal data
  
  park_buffers:
    category: vector
    format: geojson
    description: Concentric buffer rings for gradient analysis
  
  study_area:
    category: vector
    format: geojson
    description: Boundary defining the extent of analysis
  
  buffer_zones:
    category: vector
    format: geojson
    description: Buffer rings with park association removed (donut shapes)
  
  clipped_features:
    category: vector
    format: geojson
    description: Features clipped to a study boundary
  
  # === Raster Types ===
  
  land_surface_temperature:
    category: raster
    format: tif
    description: LST derived from thermal satellite imagery
    typical_units: celsius
  
  ndvi:
    category: raster
    format: tif
    description: Normalized Difference Vegetation Index
    typical_units: index
    value_range: [-1, 1]
  
  land_cover:
    category: raster
    format: tif
    description: Categorical land cover classification
    measurement_type: categorical
  
  # === Tabular Types ===
  
  zonal_statistics:
    category: tabular
    format: parquet
    description: Summary statistics aggregated by zone
  
  pci_results:
    category: tabular
    format: parquet
    description: Park Cooling Intensity calculated via TPM-M or TPM-A method
  
  correlation_matrix:
    category: tabular
    format: parquet
    description: Pairwise correlation coefficients between variables
  
  regression_results:
    category: tabular
    format: parquet
    description: Regression model outputs with coefficients and diagnostics
  
  landscape_metrics:
    category: tabular
    format: parquet
    description: Landscape pattern metrics (LSI, SHAPE_MN, PD, AI, etc.)
  
  land_cover_proportions:
    category: tabular
    format: parquet
    description: Proportional area of each land cover class within zones