id: hot_cold_spot_analysis
name: "Hot/Cold Spot Spatial Autocorrelation Analysis"
domain: thermal

description: >
  Identifies statistically significant spatial clusters of high 
  values (hot spots) and low values (cold spots) using the 
  Getis-Ord Gi* statistic. Unlike simple thresholding ("pixels 
  above 35¬įC"), this method tests whether clusters are 
  statistically significant ‚ÄĒ meaning they're unlikely to occur 
  by random chance.
  
  The Gi* statistic compares the local sum of values (a pixel 
  and its neighbors) to the global sum. When the local sum is 
  much higher than expected, it's a hot spot. When it's much 
  lower, it's a cold spot. The z-score tells us how many 
  standard deviations away from random the cluster is.

