answers_question_types:
  - spatial_clustering
  - hot_spot_identification
  - cold_spot_identification
  - thermal_landscape_classification

choices:

  confidence_thresholds:
    name: "Statistical confidence levels"
    description: >
      How certain do we need to be that a cluster is real and 
      not random noise? Higher confidence = fewer but more 
      reliable clusters. The standard approach uses three tiers.
    
    options:
    
      standard_three_tier:
        name: "90%, 95%, 99% confidence"
        id: standard_three_tier
        description: >
          Three-level classification following Xiao et al. (2023). 
          Produces six categories: hot spot at 99/95/90% and cold 
          spot at 99/95/90%.
        z_thresholds:
          confidence_90: 1.645
          confidence_95: 1.960
          confidence_99: 2.576
        when_to_use:
          - "Standard academic reporting"
          - "Policy documents requiring established methodology"
          - "Comparison with published studies"
        interpretation: >
          99% hot spots are the most severe ‚ÄĒ less than 1% chance 
          of occurring randomly. 90% spots are suggestive but 
          less certain. Areas between thresholds are thermally 
          random ‚ÄĒ no significant clustering.
      
      binary:
        name: "95% confidence only"
        id: binary
        description: >
          Simple hot/cold/not-significant classification at p=0.05. 
          Fewer categories, clearer communication.
        z_thresholds:
          confidence_95: 1.960
        when_to_use:
          - "Community presentations"
          - "When simplicity aids understanding"
          - "Screening-level analysis"
        interpretation: >
          Hot or cold at 95% confidence, or not significant. 
          Easier to communicate but loses nuance about severity.

  spatial_weights:
    name: "How to define 'neighbors'"
    description: >
      The Gi* statistic needs to know which pixels are neighbors 
      of each other. The neighborhood definition affects what 
      scale of clustering gets detected.
    
    options:
    
      queen_contiguity:
        name: "Queen contiguity"
        id: queen
        description: >
          A pixel's neighbors are the 8 cells touching it 
          (including diagonals). Detects fine-grained clustering.
        when_to_use:
          - "High-resolution rasters (< 10m)"
          - "When local variation matters"
      
      distance_band:
        name: "Distance band"
        id: distance_band
        description: >
          All pixels within a specified distance are neighbors. 
          The distance should be chosen based on the expected 
          scale of thermal influence.
        params:
          distance_m:
            type: integer
            default: 200
            guidance: >
              For urban heat island analysis at Landsat resolution, 
              200-500m captures neighborhood-scale clustering.
        when_to_use:
          - "Landsat-resolution data (30m)"
          - "When you want to control the scale of analysis"
          - "Neighborhood-scale assessment"

  output_format:
    name: "How to deliver results"
    description: >
      The analysis can output a classified raster, a vector of 
      cluster polygons, or summary statistics ‚ÄĒ depending on 
      what the community needs downstream.
    
    options:
    
      classified_raster:
        name: "Classified raster"
        id: raster
        description: >
          Each pixel gets a Gi* z-score and a cluster classification. 
          Best for visualization and further raster analysis.
      
      cluster_polygons:
        name: "Cluster polygons"
        id: polygons
        description: >
          Contiguous hot/cold spot pixels are dissolved into polygons. 
          Best for spatial joins with census or infrastructure data.
      
      summary_table:
        name: "Summary statistics"
        id: summary
        description: >
          Area and percentage of study region in each cluster category. 
          Best for reporting and city-to-city comparison.

requires_primitives:
  - hotspot_analysis:
      from: roots/statistics
      purpose: "Compute Getis-Ord Gi* and classify clusters"

requires_data:
  - name: surface_temperature
    type: raster
    semantic_types:
      - land_surface_temperature
    description: "LST raster for the study area"
  
  - name: study_boundary
    type: vector
    semantic_types:
      - study_boundary
      - city_boundary
    description: "Boundary to constrain the analysis"

produces:
  - name: hotspot_classification
    semantic_type: thermal_hotspot_classification
    data_category: raster
    description: "Gi* z-scores and cluster classification per pixel"
  
  - name: cluster_summary
    semantic_type: thermal_cluster_summary
    data_category: tabular
    description: "Area and proportion of each cluster category"

references:
  - citation: "Getis, A. & Ord, J.K. (1992)"
    note: "Original Gi* statistic"
  - citation: "Xiao, Y. et al. (2023)"
    note: "Application to urban thermal analysis in Nanjing"